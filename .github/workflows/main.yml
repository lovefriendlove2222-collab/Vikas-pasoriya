name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# पीला वार्निंग मैसेज (Node.js) हटाने के लिए
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड को GitHub से फेच करना
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. जावा सेटअप (Android के लिए जरूरी)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. फ्लटर सेटअप करना
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. डिपेंडेंसी लोड करना
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 5. प्लगइन्स और कॉन्फ़िगरेशन चेक करना
      - name: Precache Flutter artifacts
        run: flutter precache

      # 6. APK बनाना (Release Mode)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. बने हुए APK को डाउनलोड के लिए सेव करना
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
