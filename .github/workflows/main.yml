name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Force Build APK
        # यो कमांड 'Unsupported Gradle' को धक्के तै पार करैगी
        run: |
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
