name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean and Get Deps
        run: |
          flutter clean
          flutter pub get

      - name: Build Debug APK
        # यो कमांड थारे 'Unsupported Gradle' वाले एरर को बाईपास कर देगी
        run: flutter build apk --debug --no-tree-shake-icons --no-pub

      - name: Final Success Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
