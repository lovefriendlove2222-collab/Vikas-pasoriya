name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Repair and Build
        run: |
          # पुरानी गड़बड़ साफ़ करो
          flutter clean
          
          # सारी डिपेंडेंसी (Fonts समेत) दोबारा लाओ
          flutter pub get
          
          # एंड्राइड ढांचा दोबारा तैयार करो
          flutter create . --platforms=android --project-name=vikas_pasoriya
          
          chmod +x android/gradlew
          
          # बिल्ड शुरू करो
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final-build
          path: build/app/outputs/flutter-apk/app-release.apk
