name: Build Heavy Final PRO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build Official APK
        run: |
          # असली जादू: पहले फोल्डर के अंदर जाओ, फिर बिल्ड करो
          cd Vikas-pasoriya 
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Official
          # रास्ता कति पक्का कर दिया सै
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
