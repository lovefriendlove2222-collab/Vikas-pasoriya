name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # पुराने प्रोजेक्ट खात्तर जरूरी सै

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Build APK
        # यो कमांड पुराने 'Unsupported Gradle' प्रोजेक्ट को बाईपास करैगी
        run: |
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Final Success Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
