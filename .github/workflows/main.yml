name: Build Heavy Official Final
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Master Build Auto-Path
        run: |
          # यो कमांड खुद थारे फोल्डर के अंदर घुस ज्यागी, तनै नाम लिखण की जरूरत कोनी
          find . -name "pubspec.yaml" -execdir rm -f local.properties \;
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub get \;
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          # यो कति जड़ तै APK चक ल्यावेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
