name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # यो है असली इलाज - हर फाइल तै 'V' हटा देगा
      - name: Clean and Force Lowercase
        run: |
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas_Pasoriya/vikas_pasoriya/g' {} +
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas-pasoriya/vikas_pasoriya/g' {} +
          
          flutter clean
          flutter pub get
          flutter create . --platforms=android
          chmod +x android/gradlew

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final
          path: build/app/outputs/flutter-apk/app-release.apk
