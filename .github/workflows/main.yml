name: Vikas_Bhagwa_App_Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🛠️ Repair and Build
        run: |
          # नाम को सही (छोटे अक्षर) करना
          APP_NAME="vikas_pasoriya"
          
          # पुराना खराब Gradle हटाना (Error Fix)
          rm -rf android
          flutter create --project-name=$APP_NAME . --platforms android
          
          # बिल्ड शुरू
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Get Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
