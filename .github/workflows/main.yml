name: Vikas_Final_Success_Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build Official APK
        run: |
          # सिर्फ एक बार फोल्डर के अंदर जाना (जैसा थारी फोटो में सै)
          cd Vikas-pasoriya
          
          # फालतू फाइलों की खुद सफाई
          rm -f local.properties
          
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App_Final
          # रास्ता कति साफ़—एक ही फोल्डर के अंदर का बिल्ड
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
