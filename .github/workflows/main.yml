name: Vikas_Total_Fresh_Start
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Total Repair (Delete and Re-Create)
        run: |
          # १. प्रोजेक्ट के अंदर घुसना
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          cd $PROJECT_ROOT
          
          # २. pubspec.yaml कति नए सिरे तै लिखना (Error Fix)
          cat <<EOF > pubspec.yaml
          name: vikas_official
          description: Total Fresh Official App
          version: 30.0.0+1
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
          flutter:
            uses-material-design: true
          EOF

          # ३. 💣 पुराना Android फोल्डर डिलीट करके नया बणाना (यही असली कीड़ा सै)
          rm -rf android
          flutter create . --platforms android
          
          # ४. सफ़ाई और बिल्ड
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Fresh_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
