name: Build Heavy Final PRO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build Official APK
        run: |
          # यो कमांड थारे फोल्डर के अंदर घुसकै सारा काम करेगी
          cd Vikas-pasoriya || echo "Already in root"
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Official
          # यो रास्ता अब पाताल तै भी APK ढूँढ ल्यावेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
