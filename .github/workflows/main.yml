name: Build APK
on:
  push:
    branches:
      - main

# पीला एरर हटाने और GitHub Actions को नया रखने के लिए
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. कोड को GitHub से उठाना
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # 2. जावा सेटअप करना (Android बिल्ड के लिए)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. फ्लटर सेटअप करना
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      # 4. जरूरी फाइलों को सही जगह सेट करना
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
          
      # 5. APK बनाना (Release Mode में)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        
      # 6. बने हुए APK को डाउनलोड के लिए उपलब्ध कराना
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
