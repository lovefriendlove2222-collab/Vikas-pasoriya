name: Build Heavy Final OK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Automatic Fix and Build
        run: |
          # फोल्डर ढूँढना और सफाई करना
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub upgrade \;
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: Upload Heavy APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Official
          # यो रास्ता अब कति पक्का सै
          path: "**/build/app/outputs/flutter-apk/*.apk"
