name: Vikas_Small_Letters_Success
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Auto-Fix Name and Repair
        run: |
          # १. फोल्डर ढूँढो
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          cd $PROJECT_ROOT
          
          # २. छोटे अक्षरों वाला pubspec खुद लिखना (यही कीड़ा था)
          cat <<EOF > pubspec.yaml
          name: vikas_pasoriya
          description: Vikas Official App Fresh Start
          version: 35.0.0+1
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
          flutter:
            uses-material-design: true
          EOF

          # ३. पुराने गंद (local.properties) की सफ़ाई
          rm -f local.properties
          rm -f android/local.properties
          
          # ४. बिल्ड शुरू
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Final_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
