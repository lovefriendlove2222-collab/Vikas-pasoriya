name: Ultimate Auto-Fix Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # अगर gradlew गायब है, तो यह कमांड उसे खुद पैदा कर देगी
      - name: Restore Gradle Wrapper
        run: |
          cd android
          flutter build apk --debug --dry-run || true
          # अगर फिर भी नहीं है, तो एक खाली फाइल बनाकर उसे चलाने की कोशिश
          touch gradlew
          chmod +x gradlew

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
