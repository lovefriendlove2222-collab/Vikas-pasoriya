name: Force Original Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Delete Old Demo & Sync New Data
        run: |
          # पुराने डेमो को उखाड़ फेंकना
          rm -rf android/app/src/main/kotlin
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Final Badshah APK
        run: flutter build apk --debug --suppress-analytics

      - name: Upload Original APK
        uses: actions/upload-artifact@v4
        with:
          name: Badshah-Vivek-Original-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
