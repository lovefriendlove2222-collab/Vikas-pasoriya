name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons
        
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # यो पक्का रास्ता सै जो फाइल को कित्तै तै भी ढूँढ लेगा
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn # एरर की जगह वार्निंग देगा ताकि हमें सच पता चले
