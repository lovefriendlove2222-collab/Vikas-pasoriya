name: Build Official Final
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Master Build
        run: |
          # थारे फोल्डर के अंदर जाकै बिल्ड करणा
          cd Vikas-pasoriya
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Official
          # रास्ता कति पत्थर की लकीर सै
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
