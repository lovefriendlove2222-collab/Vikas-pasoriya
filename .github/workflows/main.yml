name: Build Heavy Final PRO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Force Build from Any Folder
        run: |
          # यो कमांड खुद थारे फोल्डर के अंदर घुस ज्यागी
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub get \;
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: Upload APK (Finding Everywhere)
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Final_App
          # यो कति भी फाइल पड़ी हो, उसे चक ल्यावेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
