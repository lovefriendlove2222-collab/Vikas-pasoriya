name: Flutter Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        # --debug इसलिए ताकि जल्दी और बिना किसी साइनिंग एरर के फाइल बन जावे
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # यहाँ हमने कती खुला रास्ता दे दिया सै ताकि फाइल पक्की मिले
          path: build/app/outputs/flutter-apk/*.apk
