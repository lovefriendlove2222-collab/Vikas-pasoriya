name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Force Clean and Repair
        # यह स्टेप पुराने डेमो और कैश को जला देगा ताकि साइज़ कम हो जाए
        run: |
          flutter clean
          rm -rf .dart_tool
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Optimized APK
        # --release मोड और फालतू चीजें हटाकर साइज़ 20MB के पास लाएगा
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Deliver Small APK
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Pasoriya-Lite, path: build/app/outputs/flutter-apk/app-release.apk}
