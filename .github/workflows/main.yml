name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Force Clean Build
        run: |
          flutter clean
          rm -rf .dart_tool
          # पैकेज नेम कती शुद्ध com.vikas.pasoriya
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Tiny APK
        # यो कमांड साइज़ को 148MB तै घटाकै 20MB कर देगा
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Deliver Small APK
        uses: actions/upload-artifact@v4
        with: 
          name: Vikas-Pasoriya-Lite
          path: build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
