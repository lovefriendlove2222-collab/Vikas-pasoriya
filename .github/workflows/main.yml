name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # यह स्टेप नाम और गायब फाइलें खुद ठीक करेगा
      - name: Auto-Fix Project Name & Files
        run: |
          cd android
          echo "rootProject.name = 'app'" > settings.gradle.tmp
          cat settings.gradle >> settings.gradle.tmp || true
          mv settings.gradle.tmp settings.gradle
          cd ..
          flutter create . --platforms=android
          chmod +x android/gradlew

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
