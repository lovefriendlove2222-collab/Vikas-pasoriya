name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Debug APK
        # --debug तै फाइल पक्की बणैगी और साइनिंग का रोड़ा कोनी होवै
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Final Auto-Fix Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # यो '**/ ' जादुई कोडिंग सै, यो फाइल को कहीं तै भी ढूँढ लेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
          if-no-files-found: error
