name: Build Badshah Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Force Overwrite Demo
        run: |
          chmod +x android/gradlew
          # पुराने 'Demo' फोल्डर को जड़ तै खत्म करना
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Upload Original APK
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Official-APK, path: build/app/outputs/flutter-apk/app-debug.apk}
