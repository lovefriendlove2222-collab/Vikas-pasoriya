name: Flutter Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        # --debug इसलिए ताकि साइनिंग का कोई रोड़ा ना आए और फाइल पक्की बने
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # यो पक्का रास्ता सै जो फाइल को ढूँढ लेगा
          path: build/app/outputs/flutter-apk/*.apk
