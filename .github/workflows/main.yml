name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Repair and Build APK
        run: |
          # 1. नाम की सारी गलतियां साफ़ करो
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas-pasoriya/vikas_pasoriya/g' {} +
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas_Pasoriya/vikas_pasoriya/g' {} +
          
          # 2. जो फाइलें मिसिंग हैं उन्हें दोबारा बनाओ
          flutter clean
          flutter pub get
          flutter config --no-analytics
          
          # 3. एंड्राइड फोल्डर को रिपेयर करो (ताकि 'Flutter source directory' वाली एरर हट जाए)
          flutter create . --platforms=android
          
          # 4. परमिशन दो
          chmod +x android/gradlew
          
          # 5. असली बिल्ड कमांड
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final
          path: build/app/outputs/flutter-apk/app-release.apk
