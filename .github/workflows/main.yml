name: Final Auto-Fix Heavy Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Extreme Auto-Fix Permissions
        # यो 'Permission Denied' और नाम के एरर को बाईपास करैगा
        run: |
          chmod +x android/gradlew
          flutter config --no-analytics
          # मशीन को नया ढांचा बणाने का आर्डर
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Latest Heavy APK
        # 50MB तै 10GB हैवी साइज सपोर्ट
        run: |
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver Final APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-Heavy-Latest
          path: "**/build/app/outputs/flutter-apk/*.apk"
          retention-days: 7
