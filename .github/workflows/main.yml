name: Vikas_Final_Auto_Success
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 The Universal Repair Machine
        run: |
          # १. सबसे पहले प्रोजेक्ट की असली जड़ ढूँढो
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          
          # २. अगर pubspec नहीं मिली, तो जड़ में खुद बनाओ (Repair Mode)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "Repairing Missing Files..."
            PROJECT_ROOT="Vikas-pasoriya"
            mkdir -p $PROJECT_ROOT
          fi

          cd $PROJECT_ROOT
          
          # ३. pubspec.yaml का कीड़ा कति जड़ तै खत्म करना (Auto-Writing)
          cat <<EOF > pubspec.yaml
          name: vikas_official
          description: Auto Fixed Official App
          version: 25.0.0+1
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
          flutter:
            uses-material-design: true
          EOF

          # ४. गन्दी फाइलें (local.properties) की खुद सफ़ाई
          rm -f local.properties
          rm -f android/local.properties
          
          # ५. असली काम शुरू
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Final_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
