name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Hard Reset and Build
        run: |
          flutter clean
          # डिफ़ॉल्ट डेमो को जड़ तै खत्म करना
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          
          # थारा असली 'गुरु जी की पाठशाला' वाला कोड यहाँ ज़बरदस्ती लिखा जा रहा सै
          cat <<'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(home: VikasRealHome(), debugShowCheckedModeBanner: false));
          class VikasRealHome extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text("Vikas Pasoriya"),
                  backgroundColor: Colors.orange,
                  actions: [IconButton(icon: Icon(Icons.settings), onPressed: () {})],
                ),
                drawer: Drawer(child: ListView(children: [
                  DrawerHeader(child: Center(child: Text("संस्था: गुरु जी की पाठशाला")), decoration: BoxDecoration(color: Colors.orange)),
                  ListTile(leading: Icon(Icons.info), title: Text("संस्था जानकारी")),
                  ListTile(leading: Icon(Icons.phone), title: Text("कार्यक्रम बुकिंग")),
                ])),
                body: Column(children: [
                  Container(height: 40, color: Colors.red, width: double.infinity, child: Center(child: Text("डोनर लिस्ट चालू सै...", style: TextStyle(color: Colors.white, fontWeight: FontWeight.bold)))),
                  Expanded(child: Center(child: Icon(Icons.play_circle_fill, size: 100, color: Colors.orange))),
                  Container(padding: EdgeInsets.all(15), color: Colors.grey[200], child: Row(children: [
                    Expanded(child: ElevatedButton(onPressed: () {}, style: ElevatedButton.styleFrom(backgroundColor: Colors.green), child: Text("डोनेशन", style: TextStyle(color: Colors.white)))),
                    SizedBox(width: 10),
                    Expanded(child: ElevatedButton(onPressed: () {}, style: ElevatedButton.styleFrom(backgroundColor: Colors.blue), child: Text("मंथली डोनर", style: TextStyle(color: Colors.white)))),
                  ])),
                ]),
              );
            }
          }
          EOF
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Full-Options, path: build/app/outputs/flutter-apk/*.apk}
