name: Auto_Fix_And_Build_Machine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter Machine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Smart Auto-Fixer
        run: |
          # मशीन खुद फोल्डर ढूँढेगी (तनै नाम बताण की जरूरत कोनी)
          PROJECT_PATH=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "Found project at: $PROJECT_PATH"
          
          cd $PROJECT_PATH
          
          # मशीन खुद फालतू फाइलें (local.properties) डिलीट करेगी
          rm -f local.properties
          rm -f android/local.properties
          
          # मशीन खुद पैकेट अपडेट करेगी
          flutter clean
          flutter pub get
          
          # मशीन खुद भारी बिल्ड बणावेगी
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Delivery Office
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App_Done
          # यो रास्ता अब कति पत्थर की लकीर सै
          path: "**/build/app/outputs/flutter-apk/*.apk"
