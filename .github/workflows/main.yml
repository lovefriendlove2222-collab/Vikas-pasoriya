name: Super-Auto Heavy Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Extreme Auto-Fix
        # यो स्टेप 'Unsupported Gradle' को जड़ तै खत्म करकै नया प्रोजेक्ट ढांचा बणावेगा
        run: |
          chmod +x android/gradlew
          flutter config --no-analytics
          # पुराने कचरे को साफ करके ऑनलाइन सिंक के लिए फ्रेश परमिशन
          flutter create . --overwrite --platforms=android
          flutter pub get

      - name: Build Latest Heavy APK
        # ऑनलाइन सिंक और 50MB-10GB हैवी सपोर्ट के साथ
        run: |
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver Final APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-Heavy-Latest
          path: "**/build/app/outputs/flutter-apk/*.apk"
          retention-days: 7
