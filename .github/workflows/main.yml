name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Master Repair and Build
        run: |
          # 1. पुराने कचरे की सफाई
          flutter clean
          
          # 2. नाम को हर जगह छोटा (lowercase) करना
          find . -type f -not -path '*/.*' -exec sed -i 's/Vikas-pasoriya/vikas_pasoriya/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/Vikas_Pasoriya/vikas_pasoriya/g' {} +
          
          # 3. डिपेंडेंसी दोबारा लाना
          flutter pub get
          
          # 4. एंड्राइड फोल्डर को कति नया बनाना (ताकि Source Directory वाली एरर हट जाए)
          flutter create . --platforms=android --project-name=vikas_pasoriya
          
          # 5. प्लगइन्स को सिंक करना
          cd android
          ./gradlew clean
          cd ..
          
          # 6. असली बिल्ड
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-success
          path: build/app/outputs/flutter-apk/app-release.apk
