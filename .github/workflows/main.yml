name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # नया वर्जन इस्तेमाल किया
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
          
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # नया वर्जन इस्तेमाल किया
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
