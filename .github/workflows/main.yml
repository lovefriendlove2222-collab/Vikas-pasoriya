name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Nuclear Clean and Rebuild
        run: |
          # 1. सारी पुरानी एंड्राइड फाइलां का खात्मा
          rm -rf android/
          
          # 2. नाम की कति सफाई (जहाँ भी बड़ा V या Dash सै)
          find . -type f -not -path '*/.*' -exec sed -i 's/Vikas-pasoriya/vikas_pasoriya/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/Vikas_Pasoriya/vikas_pasoriya/g' {} +
          
          # 3. नया एंड्राइड स्ट्रक्चर खड़ा करना
          flutter create . --platforms=android --project-name=vikas_pasoriya
          
          # 4. डिपेंडेंसी लाना
          flutter pub get
          
          # 5. परमिशन देना
          chmod +x android/gradlew

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final-success
          path: build/app/outputs/flutter-apk/app-release.apk
