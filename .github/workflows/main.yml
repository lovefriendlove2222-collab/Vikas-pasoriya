name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Force Clean Build
        run: |
          flutter clean
          # पैकेज नेम और प्रोजेक्ट का नाम कती फिक्स
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Tiny APK
        # साइज कम करण खात्तर debug build बिना फालतू वजन के
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Pasoriya-App, path: build/app/outputs/flutter-apk/app-debug.apk}
