name: Build Vikas Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}
      - name: Force Clean and Build
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Pasoriya-Final, path: build/app/outputs/flutter-apk/*.apk}
