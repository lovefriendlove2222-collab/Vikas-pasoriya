name: Vikas_Success_Machine_Final
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 The Auto-Repair Master
        run: |
          # १. असली जड़ ढूँढो
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          
          # २. अगर जड़ ना मिले, तो खुद फोल्डर बनाओ
          if [ -z "$PROJECT_ROOT" ]; then
            PROJECT_ROOT="Vikas-pasoriya"
            mkdir -p $PROJECT_ROOT
          fi

          cd $PROJECT_ROOT
          
          # ३. pubspec.yaml का कीड़ा कति खत्म (Fresh Write)
          cat <<EOF > pubspec.yaml
          name: vikas_official
          description: Auto Fixed Official App
          version: 27.0.0+1
          environment:
            sdk: '>=3.3.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
          flutter:
            uses-material-design: true
          EOF

          # ४. गन्दी फाइलें (local.properties) की सफाई
          rm -f local.properties
          rm -f android/local.properties
          
          # ५. बिल्ड प्रक्रिया
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Final_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
