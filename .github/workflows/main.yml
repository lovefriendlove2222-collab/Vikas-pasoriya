name: Auto-Fix Heavy Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Automatic Environment Fix
        # यो स्टेप 'Unsupported Gradle' और सिंक एरर को खुद फिक्स करैगा
        run: |
          flutter config --no-analytics
          flutter pub get
          cd android && ./gradlew clean && cd ..

      - name: Build Heavy APK (Online Sync Enabled)
        # हैवी साइज और ऑनलाइन सिंक खात्तर स्पेशल फ्लैग्स
        run: |
          flutter build apk --debug --no-tree-shake-icons --split-per-abi --suppress-analytics

      - name: Deliver Final APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-Heavy-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
          # बड़े साइज (10GB तक) की फाइलों को होल्ड करने खात्तर
          retention-days: 7
