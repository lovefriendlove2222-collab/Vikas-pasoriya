name: Build Heavy Final APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Fix Permissions & Environment
        # यो स्टेप 'Permission Denied' को जड़ तै खत्म करैगा
        run: |
          chmod +x android/gradlew
          flutter config --no-analytics
          flutter pub get

      - name: Build Heavy APK
        # 10GB तक की सपोर्ट और ऑनलाइन सिंक खात्तर
        run: |
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver Final APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-Heavy-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
