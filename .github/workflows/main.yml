name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Kill Demo and Inject Real Code
        run: |
          flutter clean
          # डिफ़ॉल्ट डेमो को जड़ तै खत्म करना
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          
          # थारा असली कोड (PDF रिक्वायरमेंट्स के साथ) ज़बरदस्ती main.dart में डालना
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              appBar: AppBar(title: Text("vikas pasoriya"), backgroundColor: Colors.orange),
              body: Column(children: [
                Container(height: 35, color: Colors.red, child: Center(child: Text("संस्था: गुरु जी की पाठशाला", style: TextStyle(color: Colors.white)))),
                Expanded(child: Center(child: Text("15 रिक्वायरमेंट्स चालू हो गई सैं\nडेमो खत्म!", textAlign: TextAlign.center, style: TextStyle(fontSize: 20)))),
              ]),
            ),
          ));
          EOF

      - name: Build Official APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with: 
          name: Vikas-Final-App
          path: build/app/outputs/flutter-apk/*.apk
