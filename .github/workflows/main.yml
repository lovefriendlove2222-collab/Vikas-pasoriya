name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        # मशीन Java 17 मांग रही सै ताकि Gradle एरर ना दे
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # स्टेबल वर्जन जो वर्जन 1.1.3+ के साथ सिंक हो सके
          channel: 'stable'
          flutter-version: '3.19.0' 

      - name: Master Fix Build
        run: |
          flutter pub get
          # पुराने प्रोजेक्ट को नई मशीन पै धक्के तै चलाने की कमांड
          flutter build apk --debug --no-tree-shake-icons

      - name: Deliver APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # यो रास्ता अब प्रोजेक्ट के हर कोने में APK ढूँढेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
