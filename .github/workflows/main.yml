name: Build Vikas Pasoriya Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Force Clean Build
        run: |
          flutter clean
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get

      - name: Build Official APK
        # इब हम split नहीं करैंगे ताकि एक ही पक्की फाइल बणै और साइज भी कम रहे
        run: flutter build apk --release --no-tree-shake-icons

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with: 
          name: Vikas-Official-App
          # इब मशीन इस फोल्डर में जो भी APK होगा उसे उठा लेगी
          path: build/app/outputs/flutter-apk/*.apk
