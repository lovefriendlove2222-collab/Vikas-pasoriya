name: Flutter Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Dependencies
        # अगर आपका कोड 'mobile_app' फोल्डर के अंदर है तो नीचे वाली लाइन रखें
        # वरना 'working-directory' हटा दें
        run: flutter pub get
        working-directory: mobile_app 

      - name: Build APK
        # --no-tree-shake-icons एरर से बचने के लिए जोड़ा गया है
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: mobile_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
