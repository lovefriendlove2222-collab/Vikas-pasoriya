name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # फिक्स वर्जन ताकि मशीन कन्फ्यूज ना हो
      - run: flutter pub get
      - run: flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4 # वर्जन 4 कर दिया जो फेल कोनी होवे
        with:
          name: Vikas-Pasoriya-Official-APK
          path: build/app/outputs/flutter-apk/app-release.apk
