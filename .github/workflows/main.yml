name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --debug --no-tree-shake-icons
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          path: "**/build/app/outputs/flutter-apk/*.apk" # यो कती पक्का रास्ता सै
