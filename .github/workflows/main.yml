name: Build Heavy APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Auto-Fix Permissions & Environment
        # यो स्टेप 'Permission Denied' और Gradle एरर को जड़ तै खत्म करैगा
        run: |
          chmod +x android/gradlew
          flutter config --no-analytics
          flutter pub get

      - name: Build Heavy APK (Online Sync Ready)
        # हैवी साइज और ऑनलाइन सिंक (Firebase) के साथ बिल्ड
        run: |
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver Heavy APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-Heavy-App
          # बड़े साइज की फाइलों को 10GB तक सपोर्ट करने का रास्ता
          path: "**/build/app/outputs/flutter-apk/*.apk"
          retention-days: 7
