name: Vikas_Final_Master_Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Auto-Pilot Build
        run: |
          # यो कमांड खुद थारे फोल्डर के अंदर घुस ज्यागी, चाहे नाम कुछ भी हो
          find . -name "pubspec.yaml" -execdir rm -f local.properties \;
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub get \;
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: 📦 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          # यो पूरी डायरेक्टरी में कितै भी APK बण्या हो, उसे चक ल्यावेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
