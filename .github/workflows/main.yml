name: Build Heavy Final PRO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build Official Release
        run: |
          # पुरानी फाइलों की जड़ तै सफाई
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub get \;
          # भारी APK बणाण का हुक्म
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Pasoriya_Official
          path: "**/build/app/outputs/flutter-apk/*.apk"
