name: Build Badshah Official
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', flutter-version: '3.19.0'}

      - name: Wipe and Force Rebuild
        run: |
          flutter clean
          rm -rf .dart_tool
          # यो कमांड पुराने नाम के रोड़े खत्म करैगी
          flutter create . --overwrite --org com.vikas.pasoriya --project-name vikas_pasoriya
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver Original APK
        uses: actions/upload-artifact@v4
        with: {name: Vikas-Badshah-App, path: build/app/outputs/flutter-apk/app-debug.apk}
