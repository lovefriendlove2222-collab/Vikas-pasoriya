name: Flutter Build APK - Auto Repair
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 1. सबसे पहले अगर फाइल गायब है तो उसे वापस लाना
      - name: Restore Missing Files
        run: |
          flutter precache
          flutter create . --platforms=android

      # 2. अब फाइल को चलाने की अनुमति देना
      - name: Give Permission to Gradlew
        run: chmod +x android/gradlew

      # 3. local.properties बनाना
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties

      # 4. APK बनाना
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 5. APK सेव करना
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
