name: Build Vikas Official Final
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Auto Fix and Build
        run: |
          # यो खुद थारे फोल्डर के अंदर घुसकै काम करेगा
          find . -name "pubspec.yaml" -execdir rm -f local.properties \;
          find . -name "pubspec.yaml" -execdir flutter clean \;
          find . -name "pubspec.yaml" -execdir flutter pub get \;
          find . -name "pubspec.yaml" -execdir flutter build apk --release --no-tree-shake-icons \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
