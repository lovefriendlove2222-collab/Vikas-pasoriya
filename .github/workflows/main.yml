name: Vikas_Auto_Fix_Machine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Smart Auto-Repair and Build
        run: |
          # मशीन खुद फोल्डर और फाइल ढूँढेगी
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          cd $PROJECT_ROOT
          
          # 🛠️ जादुई लाइन: अगर pubspec में नाम की दिक्कत सै, तो यो उसे खुद 'vikas_official' कर देगा
          sed -i '1i name: vikas_official' pubspec.yaml || true
          
          # फालतू फाइलों की सफाई
          rm -f local.properties
          rm -f android/local.properties
          
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          path: "**/build/app/outputs/flutter-apk/*.apk"
