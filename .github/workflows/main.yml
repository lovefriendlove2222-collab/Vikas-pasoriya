name: Final Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Master Fix and Build
        run: |
          flutter pub get
          # पुराने एरर को धक्के तै बाहर निकालण खात्तर यो पक्का इलाज सै
          flutter build apk --debug --no-tree-shake-icons --suppress-analytics

      - name: Deliver APK to Vivek
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          # प्रोजेक्ट में कित्तै भी APK बण्या हो, यो उसे घसीट लावेगा
          path: "**/build/app/outputs/flutter-apk/*.apk"
