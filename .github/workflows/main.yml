name: Build Heavy Official
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Automatic Setup and Build
        run: |
          cd Vikas-pasoriya
          # यो सै असली लाइन: जो तनै कोनी मिल रही, यो उसे खुद ढूंढ के डिलीट मार देगा
          rm -f local.properties
          rm -f android/local.properties
          
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
