name: Auto-Fix and Build APK
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. जावा सेटअप (v17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. फ्लटर सेटअप
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. ऑटो-फिक्स: local.properties खुद बनाना (यही सबसे बड़ी गड़बड़ थी)
      - name: Auto-Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties
          cat android/local.properties

      # 5. डिपेंडेंसी लोड करना
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
          
      # 6. APK बनाना (Release)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. APK को सेव करना ताकि आप डाउनलोड कर सकें
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
