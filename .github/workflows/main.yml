name: Build Vikas Official APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Master Build
        run: |
          # फोल्डर का नाम कति सही (V-capital)
          cd Vikas-pasoriya
          
          # फालतू फाइलों की खुद सफ़ाई
          rm -f local.properties
          
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_Final
          # पाताल तै भी APK खैंच ल्यावेगा यो रास्ता
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
