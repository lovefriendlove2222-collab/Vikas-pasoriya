name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # यो कमांड हर फाइल में जाकर थारे नाम नै कति छोटा (lowercase) कर देगी
      - name: Force Clean and Rename
        run: |
          # जहाँ भी बड़ा V या Dash सै, उसे छोटा और Underscore करो
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas-pasoriya/vikas_pasoriya/g' {} +
          find . -type f -name "*" -not -path '*/.*' -exec sed -i 's/Vikas_Pasoriya/vikas_pasoriya/g' {} +
          
          # फ्लटर नै दोबारा जगाओ
          flutter clean
          flutter pub get
          
          # एंड्राइड की फाइलां नै सही नाम तै दोबारा बनाओ
          flutter create . --offline --platforms=android --project-name=vikas_pasoriya
          
          chmod +x android/gradlew

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vikas-app-final-success
          path: build/app/outputs/flutter-apk/app-release.apk
