name: Vikas_Final_Build_Machine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🤖 Auto-Fix and Build
        run: |
          # सीधा थारे फोल्डर के अंदर घुसकै काम शुरू
          cd Vikas-pasoriya
          
          # फालतू फाइलों की खुद सफ़ाई
          rm -f local.properties
          
          flutter clean
          flutter pub get
          
          # असली हैवी बिल्ड
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Official_App
          # रास्ता कति सैट कर दिया सै
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
