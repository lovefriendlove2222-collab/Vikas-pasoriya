name: Build APK

on:
  push:
    branches:
      - main  # या अगर आपकी ब्रांच का नाम master है तो यहाँ master लिखें

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0' # आपकी फ्लटर वर्शन
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
