name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # जो एरर फोटो में था उसे यहाँ फिक्स कर दिया सै
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix and Build
        run: |
          flutter pub get
          # पुराने वर्जन का रोड़ा खत्म करण खात्तर
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas-Official-App
          path: "**/build/app/outputs/flutter-apk/*.apk"
