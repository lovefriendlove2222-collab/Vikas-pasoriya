name: Vikas_Official_New_Start
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Master Build
        run: |
          # सीधा फोल्डर में घुसना
          cd Vikas-pasoriya
          
          # पुरानी गन्दगी साफ़ करना
          rm -f local.properties
          flutter clean
          flutter pub get
          
          # हैवी APK बणाना
          flutter build apk --release --no-tree-shake-icons
          
      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_New_App
          path: "Vikas-pasoriya/build/app/outputs/flutter-apk/*.apk"
