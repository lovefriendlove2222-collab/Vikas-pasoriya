plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.vikas.pasoriya"
    compileSdk 34

    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdk 23
        targetSdk 34
        versionCode 12
        versionName "12.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}
