plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // यहाँ कति साफ़ और छोटा 'v' इस्तेमाल करया सै जो थारी फोटो तै मैच करै सै
    namespace "com.vikas.pasoriya" 
    compileSdk 34

    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdk 23
        targetSdk 34
        versionCode 12
        versionName "12.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}
