plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // थारा असली पैकेज नाम जो Firebase में सै
    namespace "com.vikas.pasoriya" 
    compileSdk 34

    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdk 21
        targetSdk 34
        versionCode 9
        versionName "9.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}
