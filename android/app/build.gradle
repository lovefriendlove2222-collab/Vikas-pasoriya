plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.vikas.pasoriya" 
    compileSdk 34

    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdk 23 // थोड़ा बढ़ा दिया ताकि ऐप स्मूथ चाले
        targetSdk 34
        versionCode 10
        versionName "10.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}
