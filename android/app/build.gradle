apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle" // यह लाइन सबसे जरूरी है

android {
    namespace "com.vikas.pasoriya"
    compileSdkVersion 34 // यहाँ 'compileSdkVersion' लिखें, सिर्फ 'compileSdk' नहीं
    
    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
    }
}
