plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.vikas_pasoriya" 
    compileSdk 34

    defaultConfig {
        applicationId "com.example.vikas_pasoriya"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 9
        versionName "1.0.9"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
