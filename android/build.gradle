plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // यहाँ कति सही नाम लिख दिया सै जो थारी फोटो में था
    namespace "com.vikas.pasoriya" 
    compileSdk 34

    defaultConfig {
        applicationId "com.vikas.pasoriya"
        minSdk 21
        targetSdk 34
        versionCode 3
        versionName "3.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}
