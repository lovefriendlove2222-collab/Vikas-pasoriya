include ':app'

def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
def properties = new Properties()

assert localPropertiesFile.exists()
localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }

def flutterRoot = properties.getProperty("flutter.sdk")
assert flutterRoot != null, "Flutter SDK not found. Define location with flutter.sdk in the local.properties file."

apply from: "$flutterRoot/packages/flutter_tools/gradle/app_plugin_loader.gradle"
