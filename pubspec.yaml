name: vikas_pasoriya
description: "Vikas Pasoriya Official App"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  youtube_player_flutter: ^9.1.3 # 3. वीडियो के लिए
  url_launcher: ^6.2.5 # 8, 10. मैप और बुकिंग के लिए
  pdf: ^3.10.7 # 11, 12. डिजिटल रशीद के लिए
  printing: ^5.11.1
  cloud_firestore: ^4.15.8 # 15. ऑनलाइन सिंक
  firebase_core: ^2.27.0
  intl: ^0.19.0 # 4. तारीख और समय के लिए

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg # 2. संस्था का लोगो
