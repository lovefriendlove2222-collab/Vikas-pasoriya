name: Vikas_Master_Bhagwa_Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🛠️ Auto-Fix and Compile
        run: |
          # १. छोटे अक्षरों वाला नाम फिक्स करना
          APP_NAME="vikas_pasoriya"
          
          # २. खराब फोल्डर की सफ़ाई
          rm -rf android
          flutter create --project-name=$APP_NAME . --platforms android
          
          # ३. बिल्ड प्रोसेस
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: 📦 Delivery APK
        uses: actions/upload-artifact@v4
        with:
          name: Vikas_Bhagwa_Official
          path: "**/build/app/outputs/flutter-apk/*.apk"
