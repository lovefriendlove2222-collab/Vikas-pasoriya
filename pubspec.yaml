name: vikas_pasoriya
description: "Vikas Pasoriya Official - Photo Registration"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  url_launcher: ^6.2.5
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  # फोटो के लिए ये नई लाइब्रेरी
  firebase_storage: ^11.6.0 # फोटो सेव करने के लिए
  image_picker: ^1.0.7 # गैलरी से फोटो लेने के
  image: ^4.1.3 # फोटो को छोटा (compress) करने के लिए

flutter:
  uses-material-design: true
