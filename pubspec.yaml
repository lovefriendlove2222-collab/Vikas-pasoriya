    sdk: flutter
  youtube_player_flutter: ^9.1.3 # 3. वीडियो खात्तर
  url_launcher: ^6.2.5 # 8, 10. मैप और बुकिंग
  firebase_core: ^2.27.0 # 15. ऑनलाइन सिंक
  cloud_firestore: ^4.15.8 # 11. डोनर डेटा
